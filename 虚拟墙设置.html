<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟墙设置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f8f9fa;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            padding: 25px;
        }

        .title {
            font-size: 24px;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .main-content {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        /* 画布区域 */
        .canvas-area {
            flex: 1;
            min-width: 600px;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .canvas-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #4a5568;
        }

        #virtual-wall-canvas {
            width: 100%;
            height: 550px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            cursor: crosshair;
        }

        /* 右侧设置面板 */
        .settings-panel {
            width: 340px;
            background: #f8fafc;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }

        .panel-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: #4a5568;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #64748b;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        .form-input:focus, .form-select:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }

        /* 图形类型按钮组 */
        .shape-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .shape-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .shape-btn.active {
            background: #60a5fa;
            color: white;
            border-color: #60a5fa;
        }

        /* 开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #60a5fa;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* 按钮 */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save {
            background-color: #60a5fa;
            color: white;
        }
        .btn-save:hover { background-color: #3b82f6; }

        .btn-reset {
            background-color: #f1f5f9;
            color: #64748b;
        }
        .btn-reset:hover { background-color: #e2e8f0; }

        .tips {
            margin-top: 15px;
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">虚拟墙设置</h1>
        
        <div class="main-content">
            <!-- 画布区域 -->
            <div class="canvas-area">
                <h3 class="canvas-title">虚拟墙绘制区域</h3>
                <canvas id="virtual-wall-canvas"></canvas>
                <div class="tips">
                    • 左键点击绘制 / 双击完成绘制<br>
                    • 右键点击可撤销上一步绘制<br>
                    • 在右侧面板选择绘制图形类型<br>
                    • 颜色、宽度参数实时生效
                </div>
            </div>

            <!-- 设置面板 -->
            <div class="settings-panel">
                <h3 class="panel-title">参数配置</h3>

                <div class="form-group">
                    <label class="form-label">虚拟墙名称</label>
                    <input type="text" class="form-input" placeholder="请输入名称" value="客厅禁区">
                </div>

                <div class="form-group">
                    <label class="form-label">墙体类型</label>
                    <select class="form-select">
                        <option>实心阻挡墙</option>
                        <option>减速提醒墙</option>
                        <option>区域边界墙</option>
                    </select>
                </div>

                <!-- 图形绘制选项 - 已移到右侧 -->
                <div class="form-group">
                    <label class="form-label">绘制图形</label>
                    <div class="shape-buttons">
                        <button class="shape-btn active" data-type="line">直线</button>
                        <button class="shape-btn" data-type="polygon">多边形</button>
                        <button class="shape-btn" data-type="circle">圆形</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">线条宽度 (px)</label>
                    <input type="number" class="form-input" id="lineWidth" value="5" min="1" max="20">
                </div>

                <div class="form-group">
                    <label class="form-label">线条颜色</label>
                    <input type="color" class="form-input" id="lineColor" value="#ef4444" style="height: 40px;">
                </div>

                <div class="form-group">
                    <label class="form-label">启用虚拟墙</label>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="form-group">
                    <label class="form-label">生效时段</label>
                    <select class="form-select">
                        <option>全天生效</option>
                        <option>自定义时段</option>
                        <option>仅清扫时生效</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="btn btn-save">保存设置</button>
                    <button class="btn btn-reset" id="clearAll">清空绘制</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('virtual-wall-canvas');
        const ctx = canvas.getContext('2d');
        const lineWidthInput = document.getElementById('lineWidth');
        const lineColorInput = document.getElementById('lineColor');

        // 绘制状态
        let currentTool = 'line';
        let points = [];
        let shapes = [];
        let isDrawing = false;
        let tempCircle = null;

        // 图形工具切换（右侧按钮）
        document.querySelectorAll('.shape-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.type;
                points = [];
                isDrawing = false;
            });
        });

        // 画布适配
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            redrawAll();
        }

        // 网格
        function drawGrid() {
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 0.5;
            for (let x = 50; x < canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 50; y < canvas.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        // 重绘所有图形
        function redrawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            
            shapes.forEach(shape => {
                ctx.strokeStyle = shape.color;
                ctx.lineWidth = shape.width;
                ctx.beginPath();
                
                if (shape.type === 'line' || shape.type === 'polygon') {
                    ctx.moveTo(shape.points[0].x, shape.points[0].y);
                    shape.points.forEach(p => ctx.lineTo(p.x, p.y));
                    if (shape.type === 'polygon') ctx.closePath();
                }
                
                if (shape.type === 'circle') {
                    ctx.arc(shape.cx, shape.cy, shape.radius, 0, Math.PI * 2);
                }
                
                ctx.stroke();
            });

            // 实时预览
            if (points.length > 0 && isDrawing) {
                let color = lineColorInput.value;
                let width = lineWidthInput.value;
                ctx.strokeStyle = color;
                ctx.lineWidth = width;
                ctx.beginPath();
                
                if (currentTool === 'line') {
                    ctx.moveTo(points[0].x, points[0].y);
                    ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
                }
                
                if (currentTool === 'polygon') {
                    ctx.moveTo(points[0].x, points[0].y);
                    points.forEach(p => ctx.lineTo(p.x, p.y));
                }
                
                if (currentTool === 'circle' && tempCircle) {
                    ctx.arc(tempCircle.cx, tempCircle.cy, tempCircle.radius, 0, Math.PI * 2);
                }
                
                ctx.stroke();
            }
        }

        // 鼠标点击
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            isDrawing = true;
            points.push({ x, y });

            if (currentTool === 'line' && points.length >= 2) {
                shapes.push({
                    type: 'line',
                    points: [...points],
                    color: lineColorInput.value,
                    width: parseInt(lineWidthInput.value)
                });
                points = [];
                isDrawing = false;
            }

            redrawAll();
        });

        // 鼠标移动（预览）
        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (currentTool === 'circle' && points.length === 1) {
                const dx = x - points[0].x;
                const dy = y - points[0].y;
                const r = Math.sqrt(dx * dx + dy * dy);
                tempCircle = { cx: points[0].x, cy: points[0].y, radius: r };
            }

            redrawAll();
        });

        // 双击完成
        canvas.addEventListener('dblclick', () => {
            if (currentTool === 'polygon' && points.length >= 3) {
                shapes.push({
                    type: 'polygon',
                    points: [...points],
                    color: lineColorInput.value,
                    width: parseInt(lineWidthInput.value)
                });
            }

            if (currentTool === 'circle' && points.length === 1 && tempCircle) {
                shapes.push({
                    type: 'circle',
                    cx: tempCircle.cx,
                    cy: tempCircle.cy,
                    radius: tempCircle.radius,
                    color: lineColorInput.value,
                    width: parseInt(lineWidthInput.value)
                });
            }

            points = [];
            isDrawing = false;
            tempCircle = null;
            redrawAll();
        });

        // 右键撤销
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (shapes.length > 0) {
                shapes.pop();
                redrawAll();
            }
        });

        // 清空
        document.getElementById('clearAll').addEventListener('click', () => {
            shapes = [];
            points = [];
            isDrawing = false;
            tempCircle = null;
            redrawAll();
        });

        // 实时参数监听
        lineWidthInput.addEventListener('input', redrawAll);
        lineColorInput.addEventListener('input', redrawAll);

        // 初始化
        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
